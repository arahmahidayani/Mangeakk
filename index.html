<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Pagi!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Nunito", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #ffecd2 0%,
          #fcb69f 30%,
          #ffd1ff 70%,
          #a8edea 100%
        );
        background-size: 300% 300%;
        animation: bgFlow 6s ease infinite;
        transition: background 0.8s ease;
        overflow: hidden;
        position: relative;
      }

      body.marah {
        background: linear-gradient(
          135deg,
          #1a0000 0%,
          #8b0000 40%,
          #cc0000 100%
        );
        background-size: 300% 300%;
        animation: bgShake 0.3s ease infinite, bgFlow 3s ease infinite;
      }

      @keyframes bgFlow {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes bgShake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }

      /* Floating bubbles background */
      .bubble {
        position: absolute;
        border-radius: 50%;
        opacity: 0.25;
        animation: floatUp linear infinite;
        pointer-events: none;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(110vh) scale(1);
          opacity: 0.25;
        }
        100% {
          transform: translateY(-20vh) scale(1.3);
          opacity: 0;
        }
      }

      /* Card container */
      .card {
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(12px);
        border-radius: 32px;
        padding: 3.5rem 4rem;
        text-align: center;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12);
        max-width: 520px;
        width: 90%;
        transition: background 0.6s ease, box-shadow 0.6s ease;
        position: relative;
        z-index: 10;
      }

      body.marah .card {
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 60px rgba(255, 0, 0, 0.5);
      }

      /* Main text */
      #main-text {
        font-size: clamp(3rem, 10vw, 5rem);
        font-weight: 900;
        color: #ff6b6b;
        letter-spacing: -1px;
        line-height: 1.1;
        text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.08);
        transition: font-size 0.4s ease, color 0.4s ease;
        animation: gentleBounce 2.5s ease-in-out infinite;
      }

      @keyframes gentleBounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      body.marah #main-text {
        font-size: clamp(4.5rem, 18vw, 8rem);
        color: #fff;
        text-shadow: 0 0 30px #ff3333, 4px 4px 0px #7a0000;
        animation: rageBounce 0.15s ease-in-out infinite;
      }

      @keyframes rageBounce {
        0%,
        100% {
          transform: scale(1) rotate(-2deg);
        }
        50% {
          transform: scale(1.08) rotate(2deg);
        }
      }

      /* Subtitle */
      #subtitle {
        font-size: clamp(1rem, 3vw, 1.25rem);
        color: #444;
        margin-top: 0.75rem;
        font-weight: 700;
        opacity: 0.75;
        transition: color 0.4s ease;
        min-height: 2em;
      }

      body.marah #subtitle {
        color: #ffaaaa;
        opacity: 1;
      }

      /* Emoji strip */
      #emoji-strip {
        font-size: 2.5rem;
        margin: 1.2rem 0;
        min-height: 3.5rem;
        animation: emojiWiggle 1.5s ease-in-out infinite;
      }

      @keyframes emojiWiggle {
        0%,
        100% {
          transform: rotate(-5deg);
        }
        50% {
          transform: rotate(5deg);
        }
      }

      body.marah #emoji-strip {
        animation: emojiSpin 0.4s linear infinite;
      }

      @keyframes emojiSpin {
        from {
          transform: rotate(0deg) scale(1);
        }
        to {
          transform: rotate(360deg) scale(1.2);
        }
      }

      /* Button */
      #main-btn {
        margin-top: 2rem;
        padding: 1rem 2.5rem;
        font-size: clamp(1rem, 3vw, 1.3rem);
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        color: #fff;
        background: linear-gradient(135deg, #ff6b6b, #ff8e53);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 6px 24px rgba(255, 107, 107, 0.45);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        animation: btnPulse 2s ease-in-out infinite;
      }

      #main-btn:hover {
        transform: scale(1.07) rotate(-1deg);
        box-shadow: 0 10px 36px rgba(255, 107, 107, 0.6);
      }

      #main-btn:active {
        transform: scale(0.95);
      }

      @keyframes btnPulse {
        0%,
        100% {
          box-shadow: 0 6px 24px rgba(255, 107, 107, 0.45);
        }
        50% {
          box-shadow: 0 6px 36px rgba(255, 107, 107, 0.75);
        }
      }

      body.marah #main-btn {
        background: linear-gradient(135deg, #555, #222);
        color: #aaa;
        cursor: not-allowed;
        animation: none;
        box-shadow: none;
        transform: none;
      }

      body.marah #main-btn:hover {
        transform: none;
      }

      /* Sparks */
      .spark {
        position: fixed;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        pointer-events: none;
        animation: sparkFly 0.8s ease-out forwards;
        z-index: 999;
      }

      @keyframes sparkFly {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(var(--dx), var(--dy)) scale(0);
          opacity: 0;
        }
      }

      /* crack overlay */
      #crack {
        display: none;
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 20;
      }

      body.marah #crack {
        display: block;
      }

      /* Responsive tweaks */
      @media (max-width: 480px) {
        .card {
          padding: 2.5rem 2rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Floating bubbles injected by JS -->

    <!-- Crack SVG overlay -->
    <svg
      id="crack"
      viewBox="0 0 100 100"
      preserveAspectRatio="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M50 0 L45 30 L55 35 L40 70 L60 72 L30 100"
        stroke="rgba(255,80,80,0.25)"
        stroke-width="0.4"
        fill="none"
      />
      <path
        d="M70 0 L65 20 L78 28 L60 60 L80 65 L55 100"
        stroke="rgba(255,80,80,0.18)"
        stroke-width="0.3"
        fill="none"
      />
      <path
        d="M20 0 L30 25 L15 35 L35 65 L10 100"
        stroke="rgba(255,80,80,0.15)"
        stroke-width="0.3"
        fill="none"
      />
    </svg>

    <div class="card">
      <div id="main-text">Selamat Pagi ☀️</div>
      <div id="emoji-strip">🌸 🌈 ✨</div>
      <div id="subtitle"></div>
      <button id="main-btn" onclick="ledak()">Klik Here 😏</button>
    </div>

    <script>
      let clicked = false;

      // Generate floating bubbles
      const colors = [
        "#ff6b6b",
        "#ffd93d",
        "#6bcfff",
        "#a29bfe",
        "#fd79a8",
        "#55efc4",
      ];
      for (let i = 0; i < 18; i++) {
        const b = document.createElement("div");
        b.className = "bubble";
        const size = Math.random() * 60 + 20;
        b.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%;
        bottom:-${size}px;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration:${Math.random() * 10 + 6}s;
        animation-delay:-${Math.random() * 10}s;
      `;
        document.body.appendChild(b);
      }

      function spawnSparks(cx, cy) {
        const sparkColors = ["#ff4444", "#ffcc00", "#ff8800", "#ff0088"];
        for (let i = 0; i < 20; i++) {
          const s = document.createElement("div");
          s.className = "spark";
          const angle = (i / 20) * 2 * Math.PI + (Math.random() - 0.5);
          const dist = 80 + Math.random() * 120;
          s.style.cssText = `
          left:${cx}px; top:${cy}px;
          background:${
            sparkColors[Math.floor(Math.random() * sparkColors.length)]
          };
          --dx:${Math.cos(angle) * dist}px;
          --dy:${Math.sin(angle) * dist}px;
          animation-delay:${Math.random() * 0.15}s;
        `;
          document.body.appendChild(s);
          setTimeout(() => s.remove(), 1200);
        }
      }

      function ledak() {
        if (clicked) return;
        clicked = true;

        const btn = document.getElementById("main-btn");
        const rect = btn.getBoundingClientRect();
        spawnSparks(rect.left + rect.width / 2, rect.top + rect.height / 2);

        document.body.classList.add("marah");

        document.getElementById("main-text").textContent = "BACOT 😡";
        document.getElementById("emoji-strip").textContent = "🔥 💢 😤";
        document.getElementById("subtitle").textContent = "Nyenyenyeney!";
        btn.textContent = "Udah dikasih tau 😤";

        // Rumble the screen briefly
        navigator.vibrate && navigator.vibrate([100, 50, 150, 50, 200]);

        // Play a tiny growl tone via Web Audio
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(80, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.4);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
          osc.start();
          osc.stop(ctx.currentTime + 0.5);
        } catch (e) {}
      }
    </script>
  </body>
</html>
