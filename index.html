<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jangan Diklik 😡</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Nunito", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffd6e7, #c9f0ff);
        transition: background 0.8s ease;
        overflow: hidden;
        position: relative;
      }

      .title {
        font-size: 2rem;
        font-weight: 900;
        color: #b06fa0;
        margin-bottom: 2rem;
        text-align: center;
        animation: floatTitle 3s ease-in-out infinite;
        text-shadow: 0 2px 12px rgba(180, 100, 160, 0.15);
      }

      @keyframes floatTitle {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .mascot {
        font-size: 5rem;
        margin-bottom: 1.5rem;
        display: block;
        transition: transform 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        animation: idle 2.5s ease-in-out infinite;
        cursor: default;
        user-select: none;
      }

      @keyframes idle {
        0%,
        100% {
          transform: rotate(-3deg) scale(1);
        }
        50% {
          transform: rotate(3deg) scale(1.05);
        }
      }

      .mascot.react {
        animation: mascotReact 0.6s ease forwards;
      }

      @keyframes mascotReact {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.4) rotate(-15deg);
        }
        60% {
          transform: scale(0.9) rotate(10deg);
        }
        100% {
          transform: scale(1.1) rotate(0deg);
          animation: idle 2.5s ease-in-out infinite;
        }
      }

      .btn-wrap {
        position: relative;
      }

      .main-btn {
        font-family: "Nunito", sans-serif;
        font-size: 1.6rem;
        font-weight: 900;
        color: #fff;
        background: linear-gradient(135deg, #f97ec2, #c97ef0);
        border: none;
        border-radius: 60px;
        padding: 1.2rem 3rem;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(200, 100, 200, 0.35),
          0 2px 8px rgba(200, 100, 200, 0.2);
        transition: transform 0.15s, box-shadow 0.15s;
        position: relative;
        z-index: 1;
        letter-spacing: 0.5px;
      }

      .main-btn:hover {
        transform: scale(1.06) translateY(-2px);
        box-shadow: 0 14px 40px rgba(200, 100, 200, 0.4),
          0 4px 12px rgba(200, 100, 200, 0.25);
      }

      .main-btn:active {
        transform: scale(0.97);
      }

      .main-btn.shake {
        animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
      }

      @keyframes shake {
        10%,
        90% {
          transform: translateX(-4px);
        }
        20%,
        80% {
          transform: translateX(6px);
        }
        30%,
        50%,
        70% {
          transform: translateX(-8px) rotate(-2deg);
        }
        40%,
        60% {
          transform: translateX(8px) rotate(2deg);
        }
        100% {
          transform: translateX(0);
        }
      }

      .main-btn.bounce {
        animation: bounce 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
      }

      @keyframes bounce {
        0% {
          transform: scale(1);
        }
        25% {
          transform: scale(1.18) translateY(-14px);
        }
        50% {
          transform: scale(0.92) translateY(4px);
        }
        75% {
          transform: scale(1.06) translateY(-6px);
        }
        100% {
          transform: scale(1) translateY(0);
        }
      }

      .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.5);
        background: #fff;
        border-radius: 28px;
        padding: 2rem 2.8rem;
        box-shadow: 0 16px 60px rgba(180, 100, 200, 0.25),
          0 4px 20px rgba(180, 100, 200, 0.15);
        font-size: 1.4rem;
        font-weight: 700;
        color: #b06fa0;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        z-index: 100;
        transition: none;
        max-width: 90vw;
        line-height: 1.6;
      }

      .popup.show {
        animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      .popup.hide {
        animation: popOut 0.3s ease forwards;
      }

      @keyframes popIn {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.4) rotate(-6deg);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
        }
      }

      @keyframes popOut {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.6) rotate(6deg);
        }
      }

      .counter {
        margin-top: 2rem;
        font-size: 1rem;
        color: #c896c8;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .counter span {
        color: #e060c0;
        font-size: 1.3rem;
      }

      /* Confetti */
      .confetti-piece {
        position: fixed;
        width: 12px;
        height: 12px;
        border-radius: 3px;
        pointer-events: none;
        z-index: 200;
        opacity: 0;
      }

      /* Sparkles */
      .sparkle {
        position: fixed;
        pointer-events: none;
        font-size: 1.5rem;
        z-index: 200;
        opacity: 0;
        animation: sparkleAnim 0.8s ease forwards;
      }

      @keyframes sparkleAnim {
        0% {
          opacity: 0;
          transform: scale(0) rotate(0deg);
        }
        40% {
          opacity: 1;
          transform: scale(1.3) rotate(180deg);
        }
        100% {
          opacity: 0;
          transform: scale(0.5) rotate(360deg) translateY(-40px);
        }
      }

      .overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 50;
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay"></div>

    <span class="mascot" id="mascot">🐱</span>
    <p class="title">⚠️ Serius deh, jangan diklik!</p>

    <div class="btn-wrap">
      <button class="main-btn" id="mainBtn" onclick="handleClick()">
        Jangan Diklik 😡
      </button>
    </div>

    <p class="counter">
      Kamu sudah melanggar: <span id="clickCount">0</span> kali 💀
    </p>

    <div class="popup" id="popup"></div>

    <script>
      const pesan = [
        "Bacot 😭",
        "Klik mulu, jomblo ya? 😭",
        "Bocah bandel! 😤",
        "Gapunya kerjaan ya? 😭",
        "Tau kok aku imut 😤",
        "lagi gabut ya😏",
        "Larangan adalah perintah ya cill",
        "Klik lagi = kamu kangen aku 😏",
        "Males ah sama bocil",
        "Bye aku emaang cute sekali",
      ];

      const maskot = [
        "🐱",
        "🐸",
        "🐼",
        "🦊",
        "🐨",
        "🐙",
        "🦄",
        "🐧",
        "🐶",
        "🐰",
      ];
      const bgColors = [
        ["#ffd6e7", "#c9f0ff"],
        ["#d4f8e8", "#ffe0fa"],
        ["#fff3cd", "#ffd6e7"],
        ["#e0d4ff", "#ffe8d4"],
        ["#d4eeff", "#f8d4ff"],
        ["#ffe0e0", "#d4ffec"],
        ["#ffecd2", "#d4e8ff"],
      ];
      const confettiColors = [
        "#f97ec2",
        "#c97ef0",
        "#79e8f9",
        "#f9d979",
        "#82f0a0",
        "#f97979",
      ];
      const sparkleEmojis = ["✨", "⭐", "💫", "🌟", "💥", "🎉", "🎊"];

      let count = 0;
      let popupTimeout = null;

      function handleClick() {
        count++;
        document.getElementById("clickCount").textContent = count;

        // Random message
        const msg = pesan[Math.floor(Math.random() * pesan.length)];
        showPopup(msg);

        // Change background
        const [c1, c2] = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;

        // Animate button
        const btn = document.getElementById("mainBtn");
        const anim = Math.random() > 0.5 ? "shake" : "bounce";
        btn.classList.remove("shake", "bounce");
        void btn.offsetWidth;
        btn.classList.add(anim);
        btn.addEventListener("animationend", () => btn.classList.remove(anim), {
          once: true,
        });

        // Mascot react
        const mascotEl = document.getElementById("mascot");
        mascotEl.textContent = maskot[count % maskot.length];
        mascotEl.classList.remove("react");
        void mascotEl.offsetWidth;
        mascotEl.classList.add("react");

        // Confetti
        spawnConfetti();
        spawnSparkles();

        // Sound (web audio beep)
        playSound();
      }

      function showPopup(msg) {
        const popup = document.getElementById("popup");
        if (popupTimeout) clearTimeout(popupTimeout);
        popup.classList.remove("show", "hide");
        void popup.offsetWidth;
        popup.textContent = msg;
        popup.classList.add("show");
        popupTimeout = setTimeout(() => {
          popup.classList.remove("show");
          popup.classList.add("hide");
        }, 2200);
      }

      function spawnConfetti() {
        const rect = document.getElementById("mainBtn").getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        for (let i = 0; i < 22; i++) {
          const el = document.createElement("div");
          el.className = "confetti-piece";
          el.style.left = cx + "px";
          el.style.top = cy + "px";
          el.style.background =
            confettiColors[Math.floor(Math.random() * confettiColors.length)];
          const angle = Math.random() * 360;
          const dist = 80 + Math.random() * 120;
          const dx = Math.cos((angle * Math.PI) / 180) * dist;
          const dy = Math.sin((angle * Math.PI) / 180) * dist - 60;
          const rotate = Math.random() * 360;
          const duration = 600 + Math.random() * 500;
          document.body.appendChild(el);

          el.animate(
            [
              { opacity: 1, transform: `translate(0,0) rotate(0deg) scale(1)` },
              {
                opacity: 0,
                transform: `translate(${dx}px,${dy}px) rotate(${rotate}deg) scale(0.5)`,
              },
            ],
            { duration, easing: "cubic-bezier(.2,.8,.5,1)", fill: "forwards" }
          );

          setTimeout(() => el.remove(), duration + 50);
        }
      }

      function spawnSparkles() {
        const rect = document.getElementById("mainBtn").getBoundingClientRect();
        for (let i = 0; i < 6; i++) {
          const el = document.createElement("div");
          el.className = "sparkle";
          el.textContent =
            sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
          const x = rect.left + Math.random() * rect.width;
          const y = rect.top + Math.random() * rect.height;
          el.style.left = x + "px";
          el.style.top = y + "px";
          el.style.animationDelay = Math.random() * 0.3 + "s";
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 1100);
        }
      }

      function playSound() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const notes = [523, 659, 784, 1047];
          notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = "sine";
            osc.frequency.value = freq;
            const t = ctx.currentTime + i * 0.08;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.12, t + 0.02);
            gain.gain.linearRampToValueAtTime(0, t + 0.15);
            osc.start(t);
            osc.stop(t + 0.2);
          });
        } catch (e) {}
      }
    </script>
  </body>
</html>
